<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>《司辰之书》事件攻略</title>
<script src="./data.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Brand fonts ── */
@font-face {
  font-family: 'Huiwen Mincho';
  src: url('./fonts/Huiwenmincho-improved.ttf') format('truetype');
  font-weight: 400 700;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Jinghua Song';
  src: url('./fonts/京華老宋体v2.002.ttf') format('truetype');
  font-weight: 400 700;
  font-style: normal;
  font-display: swap;
}

/* ── Design tokens ── */
:root {
  --paper-1:       #faf6ec;
  --paper-2:       #f3ecd8;
  --paper-3:       #e9dfc4;
  --paper-edge:    #d8cba6;
  --paper-shadow:  #b89f74;
  --paper-foxing:  #c9a87033;

  --ink-1:         #1f1810;
  --ink-2:         #4a3a28;
  --ink-3:         #806a4e;
  --ink-4:         #a8957a;

  --rubric-1:      #8c2a1e;
  --rubric-2:      #b53d2a;
  --rubric-soft:   #f4d8c8;

  --lapis-1:       #1d3461;
  --lapis-2:       #325ea0;
  --lapis-3:       #6a8ec0;
  --lapis-soft:    #dbe5f3;

  --gold-1:        #9a6f1a;
  --gold-2:        #c89a3e;
  --gold-3:        #e8cf86;
  --gold-soft:     #f6e4a8;

  --verd-1:        #285442;
  --verd-2:        #4a8268;
  --verd-soft:     #d8e8de;

  --numa-1:        #432472;
  --numa-2:        #6f3aa8;
  --numa-soft:     #ece0fa;

  --bg:            var(--paper-1);
  --fg:            var(--ink-1);
  --border:        var(--paper-edge);
  --border-strong: var(--paper-shadow);

  --font-display:  'Cormorant Garamond', 'Jinghua Song', 'Songti SC', serif;
  --font-serif:    'EB Garamond', 'Jinghua Song', 'Songti SC', serif;
  --font-han:      'Jinghua Song', 'Songti SC', 'STSong', 'SimSun', serif;
  --font-mono:     'JetBrains Mono', 'Menlo', 'Consolas', monospace;

  --fs-xs:  11px;
  --fs-sm:  13px;
  --fs-base:15px;
  --fs-md:  17px;
  --fs-lg:  20px;
  --fs-xl:  26px;

  --lh-base: 1.65;
  --lh-loose:1.85;
  --lh-snug: 1.45;

  --s-1: 4px;  --s-2: 8px;  --s-3: 12px; --s-4: 16px;
  --s-5: 20px; --s-6: 24px; --s-8: 32px;

  --r-1: 2px; --r-2: 4px; --r-3: 6px;

  --shadow-1: 0 1px 0 0 rgba(120,95,60,.10), 0 1px 3px rgba(120,95,60,.08);
  --shadow-2: 0 2px 0 0 rgba(120,95,60,.12), 0 4px 10px -2px rgba(120,95,60,.18);

  --ease:      cubic-bezier(.4,0,.2,1);
  --dur-fast:  120ms;
  --dur-normal:220ms;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; }
html, body {
  margin: 0; height: 100%;
  background: var(--bg); color: var(--fg);
  font-family: var(--font-serif); font-size: var(--fs-base);
  line-height: var(--lh-base);
  -webkit-font-smoothing: antialiased;
}
p { margin: 0 0 var(--s-3); }
::selection { background: var(--gold-soft); color: var(--ink-1); }

/* ── Layout ── */
#app { display: grid; grid-template-columns: 270px 1fr; height: 100vh; }

/* ── Mobile elements hidden on PC ── */
.m-appbar-wrap { display: none; }
.m-drawer      { display: none; }

/* ── Sidebar ── */
#sidebar {
  border-right: 1px solid var(--paper-edge);
  overflow-y: auto; padding: 16px 14px 24px;
  background: var(--paper-2);
}
.sidebar-brand {
  display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
}
.sidebar-brand img { width: 38px; height: 38px; }
.sidebar-title {
  font-family: var(--font-han); font-weight: 700; font-size: 17px;
  color: var(--ink-1); line-height: 1.15;
}
.sidebar-sub {
  font-family: var(--font-display); font-style: italic; font-size: 11px;
  color: var(--ink-3); letter-spacing: .06em; margin-top: 2px;
}
.sidebar-divider { width: 100%; height: auto; opacity: .5; margin: 4px 0 10px; }
.sidebar-section {
  font-family: var(--font-display); font-weight: 600; font-style: italic;
  font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--rubric-1);
  margin: 14px 0 6px; padding-bottom: 4px;
  border-bottom: 1px solid var(--paper-edge);
}
.sidebar-section em { font-style: italic; color: var(--numa-1); margin-left: 2px; }

.incident-list { list-style: none; padding: 0; margin: 0; }
.incident-list li {
  padding: 6px 10px; border-radius: var(--r-2); cursor: pointer;
  font-family: var(--font-han); font-size: var(--fs-sm);
  color: var(--ink-1);
  display: flex; flex-direction: column; gap: 1px;
  border-left: 2px solid transparent;
  transition: background var(--dur-fast) var(--ease);
  line-height: 1.35;
}
.incident-list li:hover { background: rgba(168,123,30,.10); border-left-color: var(--gold-2); }
.incident-list li.active {
  background: rgba(138,36,21,.12); border-left-color: var(--rubric-1);
  color: var(--rubric-1); font-weight: 600;
}
.incident-list li.numa { color: var(--numa-1); }
.incident-list li.numa.active {
  background: rgba(112,56,168,.12); border-left-color: var(--numa-2); color: var(--numa-1);
}
.li-en {
  font-family: var(--font-display); font-style: italic; font-size: 10px;
  color: var(--ink-4); letter-spacing: .04em;
}

/* ── Main column ── */
#main {
  overflow-y: auto; padding: 28px 48px 72px;
  background: var(--paper-1);
}
.placeholder {
  color: var(--ink-4); margin-top: 72px; text-align: center;
  font-family: var(--font-han); font-size: var(--fs-md);
}

/* ── Incident header ── */
.inc-header { margin-bottom: 20px; }
.inc-title {
  font-family: var(--font-han); font-weight: 700; font-size: 32px;
  line-height: 1.15; color: var(--ink-1);
  display: flex; align-items: baseline; gap: 10px; margin: 0 0 4px;
}
.badge-numa {
  font-family: var(--font-display); font-style: italic; font-size: 12px;
  letter-spacing: .10em; padding: 2px 10px; border-radius: 999px;
  background: var(--numa-soft); color: var(--numa-1); border: 1px solid #c4a4dd;
  position: relative; top: -5px;
}
.inc-en {
  font-family: var(--font-display); font-style: italic;
  font-size: 15px; color: var(--ink-3); letter-spacing: .04em; margin: 0 0 12px;
}
.inc-desc {
  font-family: var(--font-han); font-size: 15px; line-height: 1.75;
  color: var(--ink-1);
  border-left: 3px solid var(--gold-2);
  padding: 4px 0 4px 14px; margin: 0 0 12px;
  font-style: italic;
}
.inc-mystery {
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  margin: 0 0 6px;
}
.inc-mystery-label {
  font-family: var(--font-display); font-weight: 600; font-style: italic;
  font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--rubric-1);
}
.m-chip {
  display: inline-flex; align-items: center; padding: 1px 10px;
  border-radius: 999px; background: var(--gold-3);
  color: #5a3500; border: 1px solid #b8902e;
  font-family: var(--font-han); font-size: 11px; font-weight: 700;
}
.inc-rule { display: block; width: 100%; max-width: 460px; opacity: .45; margin: 18px 0 0; }

/* ── Flow diagram ── */
.flow-diagram {
  margin: 0 0 20px; padding: 12px 14px;
  background: var(--paper-2);
  border: 1px solid var(--paper-edge); border-radius: var(--r-3);
  overflow-x: auto;
}
.flow-diagram svg text { font-family: var(--font-han); }

/* ── Phase header ── */
.phase-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 14px; border-radius: var(--r-2);
  font-family: var(--font-han); font-weight: 600; font-size: 13px;
  letter-spacing: .06em;
}
.phase-pill.during { background: var(--verd-soft); color: var(--verd-1); border: 1px solid #82c896; }
.phase-pill.after  { background: var(--lapis-soft); color: var(--lapis-1); border: 1px dashed #7080cc; }
.phase-pill.after.small { padding: 3px 12px; font-size: 17px; margin-bottom: 8px; }
.phase-glyph { font-family: var(--font-display); font-style: italic; opacity: .75; }
.phase-block { display: flex; align-items: baseline; gap: 10px; margin: 20px 0 14px; }
.phase-hint { font-family: var(--font-han); font-size: 13px; color: var(--ink-3); }

/* ── Visitor grid ── */
.visitor-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 14px; margin-bottom: 24px;
}

/* ── Visitor card ── */
.vcard {
  border: 1.5px solid var(--paper-shadow); border-radius: var(--r-3);
  background: var(--paper-1); overflow: hidden;
  box-shadow: var(--shadow-1);
}
.vcard.has-chain { border-color: var(--lapis-2); }
.vcard-head {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 14px; cursor: pointer;
  background: var(--paper-2); user-select: none;
  transition: background var(--dur-fast) var(--ease);
}
.vcard.has-chain .vcard-head { background: var(--lapis-soft); }
.vcard-head:hover { background: var(--paper-3); }
.vcard.has-chain .vcard-head:hover { background: #c8d8eb; }
.vname {
  flex: 1; font-family: var(--font-han); font-weight: 700;
  font-size: 23px; color: var(--ink-1); line-height: 1.3;
}
.need-chip {
  display: inline-flex; align-items: center; padding: 2px 11px;
  border-radius: 999px; background: var(--gold-soft);
  color: #6b3f00; border: 1px solid #d8b258;
  font-family: var(--font-han); font-size: 17px; font-weight: 600; white-space: nowrap;
}
.toggle-arrow {
  color: var(--ink-3); font-size: 14px;
  font-family: var(--font-han);
  font-style: normal;
  transition: transform var(--dur-fast) var(--ease); margin-top: 2px;
  display: inline-block;
  unicode-bidi: isolate;
}
.vcard.open .toggle-arrow { transform: rotate(90deg); }
.vcard-desc {
  font-family: var(--font-han); font-size: 18px; line-height: 1.65;
  color: var(--ink-2); padding: 6px 14px 10px;
}
.consequence {
  display: none; border-top: 1px solid var(--paper-edge);
  padding: 12px 14px 14px;
  background: linear-gradient(180deg, var(--paper-1), rgba(243,234,214,.4));
}
.vcard.open .consequence { display: block; }

/* ── Talk ── */
.talk-section { padding-bottom: 8px; border-bottom: 1px solid var(--paper-edge); margin-bottom: 12px; }
.talk-block { margin-bottom: 8px; }
.talk-tag {
  display: inline-block; padding: 2px 11px; border-radius: 999px;
  font-family: var(--font-han); font-size: 17px; font-weight: 600;
  border: 1px solid; line-height: 1.5; margin-bottom: 3px;
}
.talk-tag.intro   { background: var(--lapis-soft); color: var(--lapis-1); border-color: #90b0e0; }
.talk-tag.success { background: var(--verd-soft);  color: var(--verd-1);  border-color: #82c896; }
.talk-tag.failure { background: #fce8e8; color: #8a1a1a; border-color: #e09898; }
.talk-text {
  font-family: var(--font-han); font-size: 20px;
  line-height: 1.7; color: var(--ink-1); margin: 4px 0 0; padding-left: 4px;
}
.talk-hint { font-family: var(--font-han); font-size: 17px; color: var(--ink-3); margin: 2px 0 0; }

/* ── nxi ── */
.nxi-item { display: flex; align-items: baseline; gap: 5px; padding: 2px 0; font-size: 18px; }
.nxi-who  { font-weight: bold; color: var(--verd-1); flex-shrink: 0; }
.nxi-text { color: var(--ink-2); }

/* ── nxs step ── */
.nxs-block { margin-bottom: 10px; }
.nxs-head  { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
.nxs-label {
  background: var(--rubric-1); color: var(--paper-1); border-radius: var(--r-2);
  padding: 2px 11px; font-family: var(--font-han); font-size: 18px; font-weight: 600;
}
.nxs-condition {
  background: var(--gold-soft); color: #7a5000;
  border: 1px solid #d8b258; border-radius: var(--r-2);
  padding: 1px 10px; font-family: var(--font-han); font-size: 17px;
}
.nxs-arrow { font-family: var(--font-han); font-size: 17px; color: var(--ink-3); padding-left: 8px; margin-bottom: 4px; }
.nxs-preface { font-size: 18px; color: var(--ink-3); margin: 2px 0 4px 0; font-family: var(--font-han); }

/* ── n-state block ── */
.nstate-block {
  border-left: 3px solid var(--lapis-2);
  background: var(--lapis-soft);
  padding: 8px 12px; border-radius: 0 var(--r-3) var(--r-3) 0;
  margin: 4px 0 8px 12px;
}
.nstate-block.done { border-left-color: var(--verd-1); background: var(--verd-soft); }
.nstate-name { font-family: var(--font-han); font-weight: 700; font-size: 20px; color: var(--ink-1); margin-bottom: 3px; }
.nstate-done-mark { color: var(--verd-1); }
.nstate-desc { font-family: var(--font-han); font-size: 18px; line-height: 1.65; color: var(--ink-2); margin-bottom: 4px; }

/* ── nxh reward ── */
.nxh-block {
  background: rgba(243,234,214,.7);
  border-left: 2px solid var(--gold-2);
  padding: 6px 10px; border-radius: 0 var(--r-2) var(--r-2) 0;
  margin-top: 6px;
}
.nxh-who   { font-family: var(--font-han); font-weight: 700; font-size: 18px; color: var(--lapis-1); }
.nxh-tag   {
  display: inline-block; padding: 0 9px; border-radius: var(--r-2);
  background: var(--gold-soft); color: #6b3f00;
  font-family: var(--font-han); font-size: 17px; margin-left: 6px;
  cursor: default;
}
.nxh-desc   { font-family: var(--font-han); font-size: 17px; line-height: 1.65; color: var(--ink-2); margin: 4px 0 2px; }
.nxh-result { font-family: var(--font-han); font-size: 17px; font-weight: 600; color: var(--verd-1); }

/* ── Deeper chain ── */
.deeper { border-left: 2px dashed var(--paper-shadow); margin: 6px 0 0 8px; padding-left: 10px; }
.deeper-head { font-family: var(--font-han); font-size: 17px; color: var(--ink-3); cursor: pointer; user-select: none; padding: 3px 0; }
.deeper-head:hover { color: var(--ink-1); }
.deeper-body { display: none; }
.deeper-body.open { display: block; }

/* ── No-chain visitors ── */
.no-chain-visitors { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.mini-visitor {
  border: 1px solid var(--paper-edge); border-radius: var(--r-3);
  padding: 4px 10px; font-size: 12px; display: flex; gap: 6px;
  align-items: center; background: var(--paper-2);
  font-family: var(--font-han); color: var(--ink-2);
}

/* ── Flash animation ── */
@keyframes vcard-flash {
  0%,100% { outline: none; }
  40%      { outline: 3px solid var(--rubric-2); outline-offset: 2px; }
}
.vcard.highlighted { animation: vcard-flash .8s var(--ease); }

/* ══════════════════════════════════════════
   Mobile app bar & drawer (hidden on PC)
   ══════════════════════════════════════════ */
.m-appbar-wrap {
  display: none;
  position: sticky; top: 0; z-index: 20;
  align-items: center; justify-content: space-between;
  padding: 8px 14px;
  background: var(--paper-1);
  border-bottom: 1px solid var(--paper-edge);
}
.m-appbar-title {
  font-family: var(--font-han); font-weight: 700; font-size: 16px; color: var(--ink-1);
}
.m-iconbtn {
  background: transparent; border: 0; padding: 6px 10px;
  font-family: var(--font-han); font-size: 18px; color: var(--ink-1);
  cursor: pointer; border-radius: var(--r-2);
}
.m-iconbtn:hover { background: var(--paper-3); }

.m-drawer {
  display: none;
  position: fixed; inset: 0;
  background: rgba(42,31,18,.45);
  z-index: 30;
  opacity: 0; pointer-events: none;
  transition: opacity var(--dur-normal) var(--ease);
}
.m-drawer.is-open { opacity: 1; pointer-events: auto; }
.m-drawer__panel {
  position: absolute; top: 0; left: 0; bottom: 0; width: 78%;
  max-width: 320px;
  padding: 20px 16px;
  background: linear-gradient(180deg, var(--paper-1), var(--paper-2));
  border-right: 1px solid var(--paper-shadow);
  transform: translateX(-100%);
  transition: transform var(--dur-normal) var(--ease);
  overflow-y: auto;
}
.m-drawer.is-open .m-drawer__panel { transform: translateX(0); }
.m-drawer__brand { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.m-drawer__title { font-family: var(--font-han); font-weight: 700; font-size: 17px; color: var(--ink-1); }
.m-drawer__sub   { font-family: var(--font-display); font-style: italic; font-size: 11px; color: var(--ink-3); }
.m-drawer__head {
  font-family: var(--font-display); font-style: italic; font-weight: 600;
  font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--rubric-1); margin: 14px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid var(--paper-edge);
}
.m-drawer__head--numa { color: var(--numa-1); }
.m-drawer__list { list-style: none; padding: 0; margin: 0; }
.m-drawer__item {
  padding: 8px 10px; border-radius: var(--r-2); cursor: pointer;
  font-family: var(--font-han); font-size: 14px; color: var(--ink-1);
  display: flex; flex-direction: column; gap: 1px;
  border-left: 2px solid transparent;
}
.m-drawer__item:hover { background: rgba(168,123,30,.10); border-left-color: var(--gold-2); }
.m-drawer__item.active { background: rgba(138,36,21,.12); border-left-color: var(--rubric-1); color: var(--rubric-1); font-weight: 600; }
.m-drawer__item.numa.active { background: rgba(112,56,168,.12); border-left-color: var(--numa-2); color: var(--numa-1); }
.m-drawer__en { font-family: var(--font-display); font-style: italic; font-size: 10px; color: var(--ink-4); }

/* ══════════════════════════════════════════
   Mobile breakpoint
   ══════════════════════════════════════════ */
@media (max-width: 768px) {
  html, body { height: auto; }

  #app { display: block; height: auto; min-height: 100vh; }
  #sidebar { display: none; }

  .m-appbar-wrap { display: flex; }
  .m-drawer      { display: block; }

  #main { padding: 16px 14px 56px; }

  .inc-title   { font-size: 24px; }
  .inc-en      { font-size: 13px; }
  .inc-desc    { font-size: 13px; }

  .visitor-grid { grid-template-columns: 1fr; gap: 10px; }

  .flow-diagram { display: none; }

  .phase-block { margin: 14px 0 10px; }
}
</style>
</head>
<body>
<!-- Mobile app bar -->
<div class="m-appbar-wrap" id="m-appbar-wrap">
  <button class="m-iconbtn" onclick="toggleDrawer()" aria-label="菜单">☰</button>
  <div class="m-appbar-title">司辰之书</div>
  <div style="width:40px"></div>
</div>

<!-- Mobile drawer -->
<div class="m-drawer" id="m-drawer" onclick="closeDrawer()">
  <aside class="m-drawer__panel" onclick="event.stopPropagation()">
    <div class="m-drawer__brand">
      <img src="./assets/icon-book.svg" alt="" width="34" height="34">
      <div>
        <div class="m-drawer__title">司辰之书</div>
        <div class="m-drawer__sub">事件攻略 · Incidents</div>
      </div>
    </div>
    <img src="./assets/divider-flourish.svg" alt="" style="width:100%;opacity:.45;margin:4px 0 10px">
    <div class="m-drawer__head">常规事件</div>
    <ul class="m-drawer__list" id="m-list-standard"></ul>
    <div class="m-drawer__head m-drawer__head--numa">闰时事件 <em>Numa</em></div>
    <ul class="m-drawer__list" id="m-list-numa"></ul>
  </aside>
</div>

<div id="app">
  <aside id="sidebar">
    <div class="sidebar-brand">
      <img src="./assets/icon-book.svg" alt="">
      <div>
        <div class="sidebar-title">司辰之书</div>
        <div class="sidebar-sub">事件攻略 · Incidents</div>
      </div>
    </div>
    <img src="./assets/divider-flourish.svg" alt="" class="sidebar-divider">
    <div class="sidebar-section">常规事件</div>
    <ul class="incident-list" id="list-standard"></ul>
    <div class="sidebar-section">闰时事件 <em>Numa</em></div>
    <ul class="incident-list" id="list-numa"></ul>
  </aside>
  <main id="main">
    <p class="placeholder">← 选择左侧事件查看攻略</p>
  </main>
</div>

<script>
const DATA_URL = "./data.json";
let data, byId = {}, currentIid = null;

const NX_LABELS = {
  "nx.sealing":    "捕禁", "nx.opening":    "放走",
  "nx.harming":    "击杀", "nx.thwarting":  "阻止",
  "nx.helping":    "协助", "nx.concluding": "终结",
  "nx.obscuring":  "隐匿", "nx.revealing":  "揭示",
  "nx.healing":    "治愈",
};
function nxLabel(nx) { return NX_LABELS[nx] || (nx || "").replace(/^nx\./, ""); }
function mLabel(id) { const m = byId["m:" + id]; return m ? m.label_cn : id; }
function esc(s) { return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function truncate(s, n) { return s && s.length > n ? s.slice(0, n - 1) + "…" : (s || ""); }
function splitTalkText(s) {
  if (!s) return { quote: "", hint: "" };
  const clean = s.replace(/<sprite[^>]*>/g, "◈");
  const bi = clean.indexOf("[");
  if (bi < 0) return { quote: clean.trim(), hint: "" };
  return { quote: clean.slice(0, bi).trim(), hint: clean.slice(bi + 1).replace(/\].*$/, "").trim() };
}
function buildTalkSection(pair) {
  if (!pair) return "";
  let h = `<div class="talk-section">`;
  if (pair.intro_text) {
    const p = splitTalkText(pair.intro_text);
    h += `<div class="talk-block"><span class="talk-tag intro">访客引言</span><p class="talk-text">「${esc(p.quote)}」</p>${p.hint ? `<p class="talk-hint">[ ${esc(p.hint)} ]</p>` : ""}</div>`;
  }
  if (pair.failure_text) {
    const p = splitTalkText(pair.failure_text);
    h += `<div class="talk-block"><span class="talk-tag failure">尚未帮助时</span><p class="talk-text">「${esc(p.quote)}」</p>${p.hint ? `<p class="talk-hint">[ ${esc(p.hint)} ]</p>` : ""}</div>`;
  }
  Object.entries(pair.success_texts || {}).forEach(([mkey, text]) => {
    if (!text) return;
    const p = splitTalkText(text);
    h += `<div class="talk-block"><span class="talk-tag success">成功·${esc(mLabel(mkey))}</span><p class="talk-text">「${esc(p.quote)}」</p>${p.hint ? `<p class="talk-hint">[ ${esc(p.hint)} ]</p>` : ""}</div>`;
  });
  h += `</div>`;
  return h;
}
function nxhItemKey(r) {
  let id = r.id;
  if (r.n_state) id = id.replace("nxh." + r.n_state + ".", "");
  if (r.visitor) id = id.replace(r.visitor + ".", "");
  return id;
}
function itemLabel(key) {
  return (data.items && data.items[key] && data.items[key].label) || key;
}
function itemDesc(key) {
  return (data.items && data.items[key] && data.items[key].desc) || "";
}

async function main() {
  if (window.GRAPH_DATA) { data = window.GRAPH_DATA; }
  else {
    try { data = await (await fetch(DATA_URL)).json(); }
    catch(e) { document.getElementById("main").innerHTML = '<p style="color:var(--rubric-1);padding:20px">无法加载 data.js</p>'; return; }
  }
  data.incidents.forEach(i => byId["i:" + i.id] = i);
  data.visitors.forEach(v => byId["v:" + v.id] = v);
  data.mysteries.forEach(m => byId["m:" + m.id] = m);
  data.n_states.forEach(n => byId["n:" + n.id] = n);
  (data.nxs || []).forEach(r => byId["nxs:" + r.id] = r);

  data.n_outgoing = {};
  data.n_transitions.forEach(t => (data.n_outgoing[t.from] = data.n_outgoing[t.from] || []).push(t));
  data.nrs_by_state = {};
  data.nrs.forEach(r => { if (r.n_state) (data.nrs_by_state[r.n_state] = data.nrs_by_state[r.n_state] || []).push(r); });
  data.nxs_by_state_action = {};
  (data.nxs || []).forEach(r => {
    if (!r.n_state || !r.nx_action) return;
    const k = r.n_state + "|" + r.nx_action;
    (data.nxs_by_state_action[k] = data.nxs_by_state_action[k] || []).push(r);
  });
  data.nxc_by_state = {};
  (data.nxc || []).forEach(r => {
    if (r.n_state) (data.nxc_by_state[r.n_state] = data.nxc_by_state[r.n_state] || []).push(r);
  });

  populateLists();
}

function getVisitorDeepStates(resultId, vid) {
  if (!resultId) return [];
  const seen = new Set();
  const out = [];
  (data.nrs_by_state[resultId] || []).filter(r => r.kind === "nxh" && (!r.visitor || r.visitor === vid)).forEach(r => {
    const nxAction = Object.keys(r.aspects || {}).find(k => k.startsWith("nx."));
    const tr = nxAction ? data.n_transitions.find(t => t.from === resultId && t.via === nxAction) : null;
    if (tr && !seen.has(tr.to)) {
      seen.add(tr.to);
      const ns = byId["n:" + tr.to];
      out.push({ id: tr.to, label: ns ? (ns.label_cn || tr.to) : tr.to });
    }
  });
  return out;
}

function populateLists() {
  const std  = document.getElementById("list-standard");
  const numa = document.getElementById("list-numa");
  const mStd  = document.getElementById("m-list-standard");
  const mNuma = document.getElementById("m-list-numa");
  data.incidents.forEach(inc => {
    if (inc.id === "incident.consultation") return;
    // Desktop sidebar
    const li = document.createElement("li");
    li.dataset.id = inc.id;
    if (inc.numatic) li.classList.add("numa");
    li.innerHTML = `<span>${esc(inc.label_cn)}</span><span class="li-en">${esc(inc.label_en || "")}</span>`;
    li.title = inc.id;
    li.onclick = () => { renderIncident(inc.id); markActive(inc.id); };
    (inc.numatic ? numa : std).appendChild(li);
    // Mobile drawer
    const mLi = document.createElement("li");
    mLi.dataset.id = inc.id;
    mLi.className = "m-drawer__item" + (inc.numatic ? " numa" : "");
    mLi.innerHTML = `<span>${esc(inc.label_cn)}</span><span class="m-drawer__en">${esc(inc.label_en || "")}</span>`;
    mLi.onclick = () => { renderIncident(inc.id); markActive(inc.id); closeDrawer(); };
    (inc.numatic ? mNuma : mStd).appendChild(mLi);
  });
}
function markActive(iid) {
  document.querySelectorAll(".incident-list li, .m-drawer__item").forEach(li => li.classList.toggle("active", li.dataset.id === iid));
}
function toggleDrawer() {
  document.getElementById("m-drawer").classList.toggle("is-open");
}
function closeDrawer() {
  document.getElementById("m-drawer").classList.remove("is-open");
}

// ── 流程图 SVG ──
function buildFlowSVG(inc, iid, incSuffix, reach, withChain) {
  const nInit = data.incident_to_n[iid];
  if (!nInit || !withChain.length) return "";

  const N = withChain.length;
  const ROW_H = 82, PAD_V = 26;
  const H = N * ROW_H + PAD_V * 2;
  const W = 640;

  const INC_CX = 70, INC_W = 120, INC_H = 48;
  const CON_X  = 136;
  const VIS_X  = 150, VIS_W = 162, VIS_H = 40;
  const ARR_X1 = VIS_X + VIS_W + 6;
  const ARR_X2 = ARR_X1 + 76;
  const RES_X  = ARR_X2 + 4, RES_W = 188, RES_H = 40;

  const incCY = H / 2;
  const firstY = PAD_V + ROW_H / 2;
  const lastY  = PAD_V + (N - 1) * ROW_H + ROW_H / 2;

  let s = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" style="width:100%;display:block">
<defs><marker id="flo-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
  <path d="M0,1 L9,5 L0,9 Z" fill="#806a4e"/></marker></defs>`;

  // 事件框 — lapis + gold border
  s += `
<rect x="${INC_CX - INC_W / 2}" y="${incCY - INC_H / 2}" width="${INC_W}" height="${INC_H}" rx="4" fill="#1d3461" stroke="#c89a3e" stroke-width="1.5"/>
<text x="${INC_CX}" y="${incCY - 4}" text-anchor="middle" dominant-baseline="middle" fill="#faf6ec" font-size="13" font-weight="700">${esc(truncate(inc.label_cn, 8))}</text>`;
  if (inc.label_en) s += `
<text x="${INC_CX}" y="${incCY + 13}" text-anchor="middle" fill="#c89a3e" font-size="9" font-style="italic" letter-spacing="0.06em">${esc(truncate(inc.label_en, 20))}</text>`;

  // 主干线
  s += `
<line x1="${INC_CX + INC_W / 2}" y1="${incCY}" x2="${CON_X}" y2="${incCY}" stroke="#b89f74" stroke-width="1.5"/>`;
  if (N > 1) s += `
<line x1="${CON_X}" y1="${firstY}" x2="${CON_X}" y2="${lastY}" stroke="#b89f74" stroke-width="1.5"/>`;

  withChain.forEach((vid, i) => {
    const rowY = PAD_V + i * ROW_H + ROW_H / 2;
    const v = byId["v:" + vid];
    const vLabel = truncate(v ? v.label_cn : vid, 12);
    const visCX = VIS_X + VIS_W / 2;

    // nxs 路径
    const nxs = (data.nxs || []).find(r => r.visitor === vid && r.n_state === nInit)
                || (data.nxs || []).find(r => !r.visitor && r.n_state === nInit);
    const nxsTr = nxs ? data.n_transitions.find(t => t.from === nxs.n_state && t.via === nxs.nx_action) : null;
    let resultId = nxsTr ? nxsTr.to : null;
    let action   = nxs ? nxLabel(nxs.nx_action) : "";

    // nxc/nxh 路径
    const myNxc = (data.nxc||[]).find(c => c.visitor === vid && c.n_state === nInit);
    let nxcResultId = null;
    if (myNxc) {
      const myNxh = (data.nrs_by_state[nInit]||[]).find(r => r.kind === "nxh" && r.visitor === vid);
      if (myNxh) {
        const nxhAction = Object.keys(myNxh.aspects||{}).find(k => k.startsWith("nx."));
        const nxhTr = nxhAction ? data.n_transitions.find(t => t.from === nInit && t.via === nxhAction) : null;
        if (nxhTr) nxcResultId = nxhTr.to;
      }
      if (!resultId && nxcResultId) {
        resultId = nxcResultId;
        action = truncate(myNxc.label_cn || myNxc.label_en || "帮助", 6);
        nxcResultId = null;
      }
    }

    const resultNs = resultId ? byId["n:" + resultId] : null;
    const resultLabel = truncate(resultNs ? resultNs.label_cn : (resultId || "？"), 13);
    const isDone = resultNs && resultNs.complete;

    // 访客框
    s += `
<line x1="${CON_X}" y1="${rowY}" x2="${VIS_X}" y2="${rowY}" stroke="#b89f74" stroke-width="1.5"/>
<rect x="${VIS_X}" y="${rowY - VIS_H / 2}" width="${VIS_W}" height="${VIS_H}" rx="3" fill="#faf6ec" stroke="#325ea0" stroke-width="1.5" style="cursor:pointer" onclick="openCard('vc-${vid}')"/>
<text x="${visCX}" y="${rowY}" text-anchor="middle" dominant-baseline="middle" fill="#1d3461" font-size="11" font-weight="600" style="pointer-events:none">${esc(vLabel)}</text>`;

    if (resultId) {
      const arrMidX = (ARR_X1 + ARR_X2) / 2;
      const resCX = RES_X + RES_W / 2;
      const resFill   = isDone ? "#d8e8de" : "#dbe5f3";
      const resBorder = isDone ? "#285442" : "#325ea0";
      const resText   = isDone ? "#1a4030" : "#1d3461";
      s += `
<line x1="${ARR_X1}" y1="${rowY}" x2="${ARR_X2}" y2="${rowY}" stroke="#806a4e" stroke-width="1.5" marker-end="url(#flo-arr)"/>`;
      if (action) s += `
<text x="${arrMidX}" y="${rowY - 6}" text-anchor="middle" fill="#8c2a1e" font-size="10" font-weight="700">${esc(action)}</text>`;
      s += `
<rect x="${RES_X}" y="${rowY - RES_H / 2}" width="${RES_W}" height="${RES_H}" rx="3" fill="${resFill}" stroke="${resBorder}" stroke-width="1.5" style="cursor:pointer" onclick="openCard('vc-${vid}')"/>
<text x="${resCX}" y="${rowY}" text-anchor="middle" dominant-baseline="middle" fill="${resText}" font-size="11" style="pointer-events:none">${esc(resultLabel)}</text>`;

      const deepStates = getVisitorDeepStates(resultId, vid);
      let extraY = deepStates.length;
      deepStates.slice(0, 3).forEach((ds, j) => {
        s += `
<text x="${RES_X + 6}" y="${rowY + RES_H / 2 + 14 + j * 13}" fill="#285442" font-size="10" style="pointer-events:none">↳ ${esc(truncate(ds.label, 14))}</text>`;
      });

      if (nxcResultId) {
        const nxcNs = byId["n:" + nxcResultId];
        const nxcLabel2 = truncate(nxcNs ? nxcNs.label_cn : nxcResultId, 14);
        s += `
<text x="${RES_X + 6}" y="${rowY + RES_H / 2 + 14 + extraY * 13}" fill="#6f3aa8" font-size="10" style="pointer-events:none">↳ ${esc(nxcLabel2)}</text>`;
      }
    }
  });

  s += `\n</svg>`;
  return s;
}

// ── 渲染事件主视图 ──
function renderIncident(iid) {
  currentIid = iid;
  const inc = byId["i:" + iid];
  if (!inc) return;
  document.getElementById("main").innerHTML = buildIncidentHTML(inc);
  attachListeners();
}

function buildIncidentHTML(inc) {
  const iid = inc.id;
  const myPairs = data.pairs.filter(p => p.incident === iid);
  const visitorIds = [...new Set(myPairs.map(p => p.visitor))];
  const visitorMysteries = {};
  myPairs.forEach(p => { visitorMysteries[p.visitor] = [...new Set([...(visitorMysteries[p.visitor]||[]), ...p.mysteries])]; });

  const nInit = data.incident_to_n[iid];
  const incSuffix = iid.replace(/^incident\./, "");

  // BFS 可达 n-state
  let reach = new Set();
  if (nInit) {
    reach.add(nInit);
    const q = [nInit];
    while (q.length) { const c = q.shift(); (data.n_outgoing[c]||[]).forEach(t => { if (!reach.has(t.to)) { reach.add(t.to); q.push(t.to); } }); }
  }

  // 分类访客
  const withChain = [], noChain = [];
  visitorIds.forEach(vid => {
    const hasAny = nInit && (
      (data.nxs||[]).some(nxs => reach.has(nxs.n_state) && (!nxs.visitor || nxs.visitor === vid)) ||
      (data.nxc||[]).some(c   => reach.has(c.n_state)   && c.visitor === vid)
    );
    (hasAny ? withChain : noChain).push(vid);
  });

  const mChips = inc.mysteries.map(m => `<span class="m-chip">${mLabel(m)}</span>`).join("");
  const flowSvg = buildFlowSVG(inc, iid, incSuffix, reach, withChain);

  let html = `
  <div class="inc-header">
    <div class="inc-title">
      ${esc(inc.label_cn)}
      ${inc.numatic ? '<span class="badge-numa">Numa</span>' : ''}
    </div>
    ${inc.label_en ? `<div class="inc-en">${esc(inc.label_en)}</div>` : ""}
    <p class="inc-desc">${esc((inc.desc_cn||"").replace(/\[|\]/g,""))}</p>
    ${mChips ? `<div class="inc-mystery"><span class="inc-mystery-label">相关 Mystery</span>${mChips}</div>` : ""}
    <img src="./assets/divider-flourish.svg" alt="" class="inc-rule">
  </div>
  ${flowSvg ? `<div class="flow-diagram">${flowSvg}</div>` : ""}
  <div class="phase-block">
    <span class="phase-pill during"><span class="phase-glyph">☉</span>事件期间</span>
    <span class="phase-hint">— 带正确的书帮助访客</span>
  </div>`;

  if (visitorIds.length) {
    html += `<div class="visitor-grid">`;
    [...withChain, ...noChain].forEach(vid => {
      html += buildVisitorCard(vid, visitorMysteries[vid]||[], iid, incSuffix, reach);
    });
    html += `</div>`;
  }

  return html;
}

function buildVisitorCard(vid, mysteries, iid, incSuffix, reach) {
  const v = byId["v:" + vid];
  const vLabel = v ? v.label_cn : vid;
  const mHtml = mysteries.map(m => `<span class="need-chip">需${mLabel(m)}书</span>`).join(" ");
  const pair = data.pairs.find(p => p.visitor === vid && p.incident === iid);
  const talkHtml = buildTalkSection(pair);
  const chainHtml = buildConsequenceHTML(vid, iid, incSuffix, reach);

  const hasContent = !!(talkHtml || chainHtml);
  return `
  <div class="vcard ${chainHtml ? "has-chain" : ""}" id="vc-${vid}">
    <div class="vcard-head" onclick="toggleCard('vc-${vid}')">
      <div class="vname">${esc(vLabel)}</div>
      <div style="display:flex;gap:4px;align-items:center;flex-shrink:0">
        ${mHtml}
        ${hasContent ? `<span class="toggle-arrow">›</span>` : ""}
      </div>
    </div>
    ${v && v.desc_cn ? `<div class="vcard-desc">${esc(v.desc_cn)}</div>` : ""}
    ${hasContent ? `<div class="consequence">
      ${talkHtml}
      ${chainHtml ? `<div style="margin-bottom:8px"><span class="phase-pill after small"><span class="phase-glyph">☾</span>事件结束后</span></div>${chainHtml}` : ""}
    </div>` : ""}
  </div>`;
}

function buildConsequenceHTML(vid, iid, incSuffix, reach) {
  const relevantNxs = (data.nxs||[]).filter(nxs => reach.has(nxs.n_state) && nxs.visitor === vid);
  const relevantNxc = (data.nxc||[]).filter(c => reach.has(c.n_state) && c.visitor === vid);
  if (!relevantNxs.length && !relevantNxc.length) return "";
  return relevantNxs.map(nxs => buildNxsStep(nxs, incSuffix, vid)).join("")
       + relevantNxc.map(c => buildNxcStep(c)).join("");
}

function buildNxcStep(c) {
  const vLabel = c.visitor ? (byId["v:" + c.visitor]?.label_cn || c.visitor) : "？";
  const prereqMysteryC = c.acted_required.length ? c.acted_required[0].split(".").slice(-1)[0] : null;
  const actedHtml = prereqMysteryC
    ? `<span class="nxs-condition">需先以${mLabel(prereqMysteryC)}书帮助</span>` : "";
  const matchNxh = (data.nrs_by_state[c.n_state] || [])
    .filter(r => r.kind === "nxh" && (!r.visitor || r.visitor === c.visitor));
  const nxhInner = matchNxh.map(r => {
    const itemKey = nxhItemKey(r);
    const nxAction = Object.keys(r.aspects || {}).find(k => k.startsWith("nx."));
    const tr = nxAction ? data.n_transitions.find(t => t.from === c.n_state && t.via === nxAction) : null;
    const resultNs = tr ? byId["n:" + tr.to] : null;
    const resultLabel = resultNs ? resultNs.label_cn : (tr ? tr.to : "");
    const descText = r.desc_cn || "";
    return `<div style="margin-top:4px">
      <span class="nxh-tag" title="${esc(itemDesc(itemKey))}">${esc(itemLabel(itemKey))}</span>
      ${descText ? `<p class="nxh-desc">${esc(descText)}</p>` : ""}
      ${resultLabel ? `<div class="nxh-result">→ ${esc(resultLabel)}</div>` : ""}
    </div>`;
  }).join("");
  const label = c.label_cn || c.label_en || "";
  return `
  <div class="nxs-block">
    <div class="nxs-head">
      <span class="nxs-label">帮助：${esc(label)}</span>
      ${actedHtml}
    </div>
    ${c.preface_cn ? `<div class="nxs-preface">${esc(c.preface_cn)}</div>` : ""}
    <div class="nxh-block" style="margin-top:6px">
      <span class="nxh-who">${esc(vLabel)}</span>
      ${nxhInner}
    </div>
  </div>`;
}

function buildNxsStep(nxs, incSuffix, vid) {
  const label = nxs.label_cn || nxs.label_en || "";
  const prereqEntry = (nxs.acted_required||[]).find(a => a.split(".").slice(2,-1).join(".") === incSuffix);
  const hasExcl     = (nxs.acted_excluded||[]).some(a => a.split(".").slice(2,-1).join(".") === incSuffix);
  const prereqMystery = prereqEntry ? prereqEntry.split(".").slice(-1)[0] : null;
  const condHtml = prereqEntry ? `<span class="nxs-condition">需先以${mLabel(prereqMystery)}书帮助</span>`
                 : hasExcl     ? `<span class="nxs-condition">其余访客均未被帮助时</span>` : "";

  const tr = data.n_transitions.find(t => t.from === nxs.n_state && t.via === nxs.nx_action);
  const targetState = tr ? tr.to : null;
  const targetHtml = targetState ? buildNStateBlock(targetState, 0, vid) : "";

  const preface = nxs.preface_cn ? `<div class="nxs-preface">${esc(nxs.preface_cn)}</div>` : "";
  const desc    = nxs.desc_cn    ? `<p class="nxh-desc" style="padding-left:8px">${esc(nxs.desc_cn)}</p>` : "";

  return `
  <div class="nxs-block">
    <div class="nxs-head">
      <span class="nxs-label">询问：${esc(label)}</span>
      ${condHtml}
    </div>
    ${preface}
    <div class="nxs-arrow">↓ ${nxLabel(nxs.nx_action)}</div>
    ${desc}
    ${targetHtml}
  </div>`;
}

function buildNStateBlock(nid, depth, vid) {
  const ns = byId["n:" + nid];
  const label = ns ? ns.label_cn : nid;
  const isDone = ns && ns.complete;
  const desc = ns ? (ns.desc_cn || "") : "";
  const allNrs = (data.nrs_by_state[nid] || []).filter(r => !r.visitor || !vid || r.visitor === vid);

  // nxi 回顾对话
  const nxiHtml = allNrs.filter(r => r.kind === "nxi").map(r => {
    const vLabel = r.visitor ? (byId["v:" + r.visitor]?.label_cn || r.visitor) : "？";
    const text = r.preface_cn || r.desc_cn || "";
    return `<div class="nxi-item"><span class="nxi-who">${esc(vLabel)}</span>${text ? `<span class="nxi-text">：${esc(text)}</span>` : ""}</div>`;
  }).join("");

  // nxh 深层行动
  const nxhHtml = allNrs.filter(r => r.kind === "nxh").map(r => {
    const vLabel = r.visitor ? (byId["v:" + r.visitor]?.label_cn || r.visitor) : "？";
    const itemKey = nxhItemKey(r);
    const nxAction = Object.keys(r.aspects || {}).find(k => k.startsWith("nx."));
    const tr = nxAction ? data.n_transitions.find(t => t.from === nid && t.via === nxAction) : null;
    const resultNs = tr ? byId["n:" + tr.to] : null;
    const resultLabel = resultNs ? resultNs.label_cn : (tr ? tr.to : "");
    const descText = r.desc_cn || "";
    return `<div class="nxh-block">
      <span class="nxh-who">${esc(vLabel)}</span><span class="nxh-tag" title="${esc(itemDesc(itemKey))}">${esc(itemLabel(itemKey))}</span>
      ${descText ? `<p class="nxh-desc">${esc(descText)}</p>` : ""}
      ${resultLabel ? `<div class="nxh-result">→ ${esc(resultLabel)}</div>` : ""}
    </div>`;
  }).join("");

  // 深层 nxs 分支
  let deeperHtml = "";
  if (depth < 2) {
    (data.n_outgoing[nid] || []).forEach(tr => {
      (data.nxs_by_state_action[nid + "|" + tr.via] || []).forEach(nxs => {
        const vLabel = nxs.visitor ? (byId["v:" + nxs.visitor]?.label_cn || nxs.visitor) : "?";
        const nxsLabel = nxs.label_cn || nxs.label_en || "";
        const subTarget = data.n_transitions.find(t => t.from === nxs.n_state && t.via === nxs.nx_action);
        const subTargetHtml = subTarget ? buildNStateBlock(subTarget.to, depth + 1, vid) : "";
        deeperHtml += `
          <div class="nxs-block">
            <div class="nxs-head">
              <span class="nxs-label">询问：${esc(nxsLabel)}</span>
              <span style="font-size:11px;color:var(--ink-4)">${esc(vLabel)}</span>
            </div>
            <div class="nxs-arrow">↓ ${nxLabel(nxs.nx_action)}</div>
            ${subTargetHtml}
          </div>`;
      });
    });
  }

  const deeperId = "deeper-" + nid + "-" + depth;
  const deeperWrap = deeperHtml ? `
    <div class="deeper">
      <div class="deeper-head" onclick="toggleDeeper('${deeperId}')">▶ 展开后续分支</div>
      <div class="deeper-body" id="${deeperId}">${deeperHtml}</div>
    </div>` : "";

  return `
  <div class="nstate-block ${isDone ? "done" : ""}">
    <div class="nstate-name">${isDone ? '<span class="nstate-done-mark">✓ </span>' : ""}${esc(label)}</div>
    ${desc ? `<div class="nstate-desc">${esc(desc)}</div>` : ""}
    ${nxiHtml}
    ${nxhHtml}
    ${deeperWrap}
  </div>`;
}

function attachListeners() {}
function toggleCard(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle("open");
}
function toggleDeeper(id) {
  const body = document.getElementById(id);
  if (!body) return;
  body.classList.toggle("open");
  const head = body.previousElementSibling;
  if (head) head.textContent = body.classList.contains("open") ? "▼ 折叠后续分支" : "▶ 展开后续分支";
}
function openCard(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add("open");
  el.classList.remove("highlighted");
  void el.offsetWidth;
  el.classList.add("highlighted");
  setTimeout(() => el.classList.remove("highlighted"), 800);
  el.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

main();
</script>
</body>
</html>
